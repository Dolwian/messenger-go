<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/style.css">
        <script src="/chat.js" defer></script>
    </head>
    <body>
        <header class="header">
            <div class="container header__inner">
                <a href="/" class="header__logo">Мессенджер</a>

                <nav class="header__nav">
                </nav>

                <div class="header__actions">
                    <input id="nickname" type="text" placeholder="Никнейм (ID)"/>
                    <input id="connectButton" onclick="connect()" type="button" value="Подключиться"/>
                    <!-- <input id="recipient" type="text" placeholder="Получатель (ID)"/> -->
                </div>
            </div>
        </header>

        <main class="main">
            <aside id="sidebar" class="sidebar">
                <div class="chn-btn">
                    <div class="chn-avatar"></div>
                    <div class="chn-content">
                        <div class="chn-header">
                            <input id="activeRoom" type="text" placeholder="Комната"/>
                            <input id="joinRoom" onclick="joinRoom()" type="button" value="Присоединиться"/>
                        </div>
                        <div class="sub-text">
                        </div>
                    </div>
                </div>
                <div class="chn-btn">
                    <div class="chn-avatar"></div>
                    <div class="chn-content">
                        <div class="chn-header">
                            <!-- <input id="room" type="text" placeholder="Комната"/> -->
                            <input id="fetchRooms" onclick="fetchRooms()" type="button" value="Список комнат"/>
                        </div>
                        <div class="sub-text">
                        </div>
                    </div>
                </div>
                <div id="channels" class="channels"></div>
            </aside>
            <section class="chat">
                <div id="chatbox" class="chatbox"></div>

                <div class="message-input-wrapper">
                    <div class="message-input-text">
                        <div
                            id="messageInput"
                            class="message-input"
                            contenteditable="true"
                            role="textbox"
                            placeholder="Сообщение..."
                        ></div>
                        <div class="placeholder">Введите текст...</div>
                    </div>
                        <button onclick="sendMessage()" type="submit">⌲</button>
                </div>
            </section>
        </main>

        <template id="message-template">
            <div class="message">
                <span class="message-header"></span> <span class="message-time">Дата</span>
                <div class="message-body"></div>
            </div>
        </template>
        <template id="channel-template">
            <button class="chn-btn">
                <div class="chn-avatar"></div>

                <div class="chn-content">
                    <div class="chn-header"></div>
                    <div class="sub-text"></div>
                </div>
            </button>
        </template>
    </body>
</html>
